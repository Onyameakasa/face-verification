<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Head Verification - Play & Reverse</title>
    <style>
        body {
            margin: 0; background: #111; color: white;
            font-family: Arial, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .video-container {
            position: relative; width: 420px; height: 480px;
            background: #000; border-radius: 12px;
            overflow: hidden; margin: 20px;
        }
        video {
            width: 100%; height: 100%; object-fit: cover;
        }
        .controls {
            display: flex; gap: 12px; flex-wrap: wrap;
            justify-content: center; margin-top: 10px;
        }
        button {
            padding: 14px 24px; font-size: 18px;
            cursor: pointer; background: #333; color: white;
            border: none; border-radius: 8px;
        }
        button:hover { background: #555; }
        .center-btn { background: #4CAF50; }
        #status { margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>

    <h1>Head Verification Demo</h1>
    
    <div class="video-container">
        <video id="mainVideo" muted playsinline></video>
    </div>

    <div class="controls">
        <button onclick="playAction('left')">← Left</button>
        <button onclick="playAction('right')">Right →</button>
        <button onclick="playAction('up')">↑ Up</button>
        <button onclick="playAction('down')">↓ Down</button>
        <button onclick="playCenter()" class="center-btn">Stay Focus (Center)</button>
    </div>

    <div id="status">Click a button to start verification</div>

    <script>
        const video = document.getElementById('mainVideo');
        let currentAction = null;

        // Replace these with your own uploaded video files
        const clips = {
            center: "center.mp4",
            left:   "left.mp4",     // head turning left (forward clip)
            right:  "right.mp4",
            up:     "up.mp4",
            down:   "down.mp4"
        };

        function playCenter() {
            video.src = clips.center;
            video.loop = true;
            video.play();
            document.getElementById('status').textContent = "Center (Neutral)";
        }

        function playAction(direction) {
            if (currentAction === direction) return;
            
            currentAction = direction;
            video.loop = false;
            video.src = clips[direction];
            video.currentTime = 0;
            video.playbackRate = 1;   // Normal forward speed
            
            video.onended = () => {
                // Auto reverse back to center
                video.playbackRate = -1;   // Reverse
                video.play();
                
                // Stop reverse when back to start
                const checkReverse = setInterval(() => {
                    if (video.currentTime <= 0.1) {
                        video.pause();
                        video.playbackRate = 1;
                        clearInterval(checkReverse);
                        playCenter();   // Return to neutral loop
                        currentAction = null;
                    }
                }, 50);
            };

            video.play();
            document.getElementById('status').textContent = Playing ${direction} → returning to center;
        }

        // Start with center video
        window.onload = () => {
            video.src = clips.center;
            video.loop = true;
            video.play();
        };
    </script>
</body>
</html>
